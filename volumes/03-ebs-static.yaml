apiVersion: v1
kind: PersistentVolume
metadata:
  name: test-pv 
spec:
  accessModes:
  - ReadWriteOnce
  capacity: 
    storage: 50Gi
  csi:
    driver: ebs.csi.aws.com 
    fsType: ext4
    volumeHandle: vol-02874683b0b8f837b
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs
spec:
  storageClassName: ""
  volumeName: test-pv
  accessModes: 
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata: 
  name: app
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: html-data
      mountPath: /usr/share/nginx/html
  volumes:
  - name: html-data
    persistentVolumeClaim:
      claimName: ebs