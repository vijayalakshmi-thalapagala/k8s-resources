apiVersion: v1
kind: Pod
metadata:
  name: resources-demo
spec:
  containers:
  - name: nginx
    image: nginx
    resources: 
      # soft limit
      requests:
        memory: "64Mi" #RAM
        cpu: "100m" #cpu
      # hard limit
      limits:
        memory: "128Mi" # RAM
        cpu: "150m" #cpu