apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # these labels are replicaset labels
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
spec:
  replicas: 3
  selector:
  #using those labels replica set selects the pod
    matchLabels: 
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
      #this is pod definition, pod is subnet of replicaset
  template: 
    metadata:
      labels: 
        project: roboshop
        purpose: rs-demo
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx